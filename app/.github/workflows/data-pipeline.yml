name: Data Pipeline

on:
  schedule:
    - cron: '0 * * * *'  # Every hour
  workflow_dispatch:       # Manual trigger

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r data-pipeline/requirements.txt

      - name: Run data pipeline
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
        run: python data-pipeline/run_pipeline.py

      - name: Commit updated data files
        run: |
          git config user.name "PowderCast Bot"
          git config user.email "bot@powdercast.app"
          git add public/data/
          git diff --staged --quiet || git commit -m "Update forecast data $(date -u +%Y-%m-%dT%H:%M:%SZ)"

      - name: Push changes
        run: git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
